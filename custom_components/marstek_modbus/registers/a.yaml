BUTTON_DEFINITIONS:
    reset_device:
        register: 41000
        command: 21930
        icon: "mdi:restart"
        category: diagnostic
        enabled_by_default: false
        data_type: uint16
    factory_reset:
        register: 41001
        command: 21930
        icon: "mdi:factory"
        category: diagnostic
        enabled_by_default: false
        data_type: uint16

EFFICIENCY_SENSOR_DEFINITIONS:
    round_trip_efficiency_total:
        key: round_trip_efficiency_total
        unit: "%"
        icon: "mdi:percent"
        category: diagnostic
        state_class: measurement
        mode: round_trip
        dependency_keys:
            charge: total_charging_energy
            discharge: total_discharging_energy
    round_trip_efficiency_monthly:
        key: round_trip_efficiency_monthly
        unit: "%"
        icon: "mdi:percent"
        category: diagnostic
        state_class: measurement
        mode: round_trip
        dependency_keys:
            charge: total_monthly_charging_energy
            discharge: total_monthly_discharging_energy
    conversion_efficiency:
        key: conversion_efficiency
        unit: "%"
        category: diagnostic
        state_class: measurement
        mode: conversion
        dependency_keys:
            battery_power: battery_power
            ac_power: ac_power

STORED_ENERGY_SENSOR_DEFINITIONS:
    stored_energy:
        key: stored_energy
        unit: kWh
        device_class: energy
        state_class: total
        dependency_keys:
            soc: battery_soc
            capacity: battery_total_energy
